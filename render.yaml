services:
  - type: web
    name: inventory-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Cross-site cookies for the Vercel frontend.
      - key: COOKIE_SAMESITE
        value: None
      - key: COOKIE_SECURE
        value: "true"
      # Secrets — set these in the Render dashboard, not in this file.
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SECRET_APP_PIN
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET_NAME
        sync: false
      # The deployed frontend origin (set after Vercel gives you a URL).
      - key: FRONTEND_ORIGIN
        sync: false
